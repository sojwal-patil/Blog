{%load static%}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{%block title%}Title{% endblock %}</title>
    <link rel="stylesheet" href="{% static "style.css" %}">

    {% comment %} daisy ui CDN {% endcomment %}
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

{% comment %} Font Awesome CDN {% endcomment %}
    <script src="https://kit.fontawesome.com/96d552640e.js" crossorigin="anonymous"></script>

</head>
<body class="select-none flex">

    <div class="leftpanel border-[1px] border-black/50 w-[170px] text-center h-screen">
    <ul class="p-3 dashboard-left-panel-ul">
        <li><h1>Blogify</h1></li>
        <li>
            <button class="btn m-[5px] border-[1px] border-black">
                <a href="{% url "newpost" %}">
                   New Post
                 </a>
            </button>
        </li>

        <li class="p-2 hover:bg-gray-100"><a href="">Posts</a></li>
        <li class="p-2 hover:bg-gray-100"><a href="">Pages</a></li>
        <li class="p-2 hover:bg-gray-100"><a href="">Stats</a></li>
        <li class="p-2 hover:bg-gray-100"><a href=""><i class="fa-solid fa-arrow-up-right-from-square text-gray-500"></i>&nbsp;View Blog</a></li>
    </ul>
    </div>

    <div class="postarea">
        <ul>
            {%for post in blogposts%}
            <li>
                <h3>{{post.title}}</h3>
                <h4>{{post.date}}</h4><br>
            </li>
            {%endfor%}
        </ul>
    </div>
    

</body>
</html>
